AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bedrock AI Analyser - Monitor and analyse your AWS Bedrock usage,
  capacity, and quotas with real-time dashboards and AI-powered insights.

Parameters:
  AdminPassword:
    Type: String
    NoEcho: true
    MinLength: 6
    Description: Password for the admin dashboard login (username is 'admin')
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance size
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      IP address or CIDR range allowed to access the dashboard (e.g. 203.0.113.50/32).
      Use 0.0.0.0/0 to allow access from anywhere.
  SourceBundleURL:
    Type: String
    Default: ''
    Description: >
      S3 URL of the app source bundle (tar.gz). Leave empty if uploading code manually via SSM.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Dashboard Access }
        Parameters: [AdminPassword, AllowedIP]
      - Label: { default: Infrastructure }
        Parameters: [InstanceType]
    ParameterLabels:
      AdminPassword: { default: Admin Password }
      AllowedIP: { default: Allowed IP / CIDR }
      InstanceType: { default: Instance Type }

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: BedrockAnalyserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                  - cloudwatch:GetMetricData
                  - servicequotas:ListServiceQuotas
                  - servicequotas:GetServiceQuota
                  - servicequotas:RequestServiceQuotaIncrease
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                  - bedrock:InvokeModel
                  - sts:GetCallerIdentity
                  - iam:ListAccountAliases
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Bedrock AI Analyser Dashboard
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedIP

  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M
    Properties:
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref SecurityGroup]
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      Tags:
        - Key: Name
          Value: bedrock-ai-analyser
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Signal function
          signal_cfn() {
            /opt/aws/bin/cfn-signal -e $1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
          }
          trap 'signal_cfn 1' ERR

          # Install Node.js 20
          dnf update -y
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf remove -y nodejs
          dnf install -y nodejs --best --allowerasing

          # Create app directory
          mkdir -p /opt/bedrock-analyser
          cd /opt/bedrock-analyser

          # Write .env
          cat > .env << 'ENVEOF'
          AWS_REGION=${AWS::Region}
          PORT=3000
          LOGIN_USERNAME=admin
          LOGIN_PASSWORD=${AdminPassword}
          ENVEOF
          # Fix indentation in .env
          sed -i 's/^          //' .env

          # Write package.json
          cat > package.json << 'PKGEOF'
          {
            "name": "bedrock-ai-analyser",
            "version": "1.0.0",
            "type": "module",
            "dependencies": {
              "@aws-sdk/client-bedrock": "^3.700.0",
              "@aws-sdk/client-bedrock-runtime": "^3.700.0",
              "@aws-sdk/client-cloudwatch": "^3.700.0",
              "@aws-sdk/client-service-quotas": "^3.700.0",
              "@aws-sdk/client-sns": "^3.700.0",
              "@aws-sdk/client-sts": "^3.700.0",
              "@aws-sdk/client-iam": "^3.700.0",
              "tsx": "^4.19.0",
              "typescript": "^5.6.0"
            },
            "devDependencies": {
              "@types/node": "^22.0.0"
            }
          }
          PKGEOF
          sed -i 's/^          //' package.json

          # Write tsconfig.json
          cat > tsconfig.json << 'TSCEOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "module": "ESNext",
              "moduleResolution": "bundler",
              "lib": ["ES2022"],
              "outDir": "./dist",
              "rootDir": "./src",
              "strict": true,
              "esModuleInterop": true,
              "skipLibCheck": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true
            },
            "include": ["src/**/*"],
            "exclude": ["node_modules", "dist"]
          }
          TSCEOF
          sed -i 's/^          //' tsconfig.json

          # Download and extract app source
          if [ -n "${SourceBundleURL}" ]; then
            curl -fsSL "${SourceBundleURL}" -o /tmp/app.tar.gz
            tar xzf /tmp/app.tar.gz -C /opt/bedrock-analyser/
            rm /tmp/app.tar.gz
          else
            mkdir -p src/lib src/types src/web
          fi

          # Install dependencies
          npm install

          # Create systemd service
          cat > /etc/systemd/system/bedrock-analyser.service << 'SVCEOF'
          [Unit]
          Description=Bedrock AI Analyser
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/bedrock-analyser
          ExecStart=/usr/bin/npx tsx src/web/server.ts
          Restart=always
          RestartSec=5
          EnvironmentFile=/opt/bedrock-analyser/.env

          [Install]
          WantedBy=multi-user.target
          SVCEOF
          sed -i 's/^          //' /etc/systemd/system/bedrock-analyser.service

          systemctl daemon-reload
          systemctl enable bedrock-analyser

          # Start service if source code was provided
          if [ -f /opt/bedrock-analyser/src/web/server.ts ]; then
            systemctl start bedrock-analyser
          fi

          # Signal success
          signal_cfn 0

Mappings:
  RegionAMI:
    us-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-east-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-southeast-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-southeast-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-northeast-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ca-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    sa-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Outputs:
  DashboardURL:
    Description: Bedrock AI Analyser Dashboard URL
    Value: !Sub 'http://${Instance.PublicIp}:3000'
  InstanceId:
    Description: EC2 Instance ID (connect via SSM)
    Value: !Ref Instance
  NextSteps:
    Description: Upload the app source code to complete setup
    Value: !Sub >
      Instance is ready. Upload the app source code to /opt/bedrock-analyser/
      using SSM: aws ssm start-session --target ${Instance} --region ${AWS::Region}
