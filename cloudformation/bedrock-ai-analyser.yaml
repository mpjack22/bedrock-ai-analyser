AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bedrock AI Analyser - Monitor and analyse your AWS Bedrock usage,
  capacity, and quotas with real-time dashboards and AI-powered insights.

Parameters:
  AdminPassword:
    Type: String
    NoEcho: true
    MinLength: 6
    Description: Password for the admin dashboard login (username is 'admin')
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance size
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      IP address or CIDR range allowed to access the dashboard (e.g. 203.0.113.50/32).
      Use 0.0.0.0/0 to allow access from anywhere.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Dashboard Access }
        Parameters: [AdminPassword, AllowedIP]
      - Label: { default: Infrastructure }
        Parameters: [InstanceType]
    ParameterLabels:
      AdminPassword: { default: Admin Password }
      AllowedIP: { default: Allowed IP / CIDR }
      InstanceType: { default: Instance Type }

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: BedrockAnalyserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                  - cloudwatch:GetMetricData
                  - servicequotas:ListServiceQuotas
                  - servicequotas:GetServiceQuota
                  - servicequotas:RequestServiceQuotaIncrease
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                  - bedrock:InvokeModel
                  - sts:GetCallerIdentity
                  - iam:ListAccountAliases
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Bedrock AI Analyser Dashboard
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedIP

  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref SecurityGroup]
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      Tags:
        - Key: Name
          Value: bedrock-ai-analyser
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Signal function
          signal_cfn() {
            /opt/aws/bin/cfn-signal -e $1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
          }
          trap 'signal_cfn 1' ERR

          # Install Node.js 20 and git
          dnf update -y
          dnf install -y git
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf remove -y nodejs
          dnf install -y nodejs --best --allowerasing

          # Clone the app from GitHub
          git clone https://github.com/mpjack22/bedrock-ai-analyser.git /opt/bedrock-analyser
          cd /opt/bedrock-analyser

          # Write .env
          echo "AWS_REGION=${AWS::Region}" > /opt/bedrock-analyser/.env
          echo "PORT=3000" >> /opt/bedrock-analyser/.env
          echo "LOGIN_USERNAME=admin" >> /opt/bedrock-analyser/.env
          echo "LOGIN_PASSWORD=${AdminPassword}" >> /opt/bedrock-analyser/.env

          # Install dependencies
          npm install

          # Create systemd service
          echo "[Unit]" > /etc/systemd/system/bedrock-analyser.service
          echo "Description=Bedrock AI Analyser" >> /etc/systemd/system/bedrock-analyser.service
          echo "After=network.target" >> /etc/systemd/system/bedrock-analyser.service
          echo "" >> /etc/systemd/system/bedrock-analyser.service
          echo "[Service]" >> /etc/systemd/system/bedrock-analyser.service
          echo "Type=simple" >> /etc/systemd/system/bedrock-analyser.service
          echo "User=root" >> /etc/systemd/system/bedrock-analyser.service
          echo "WorkingDirectory=/opt/bedrock-analyser" >> /etc/systemd/system/bedrock-analyser.service
          echo "ExecStart=/usr/bin/npx tsx src/web/server.ts" >> /etc/systemd/system/bedrock-analyser.service
          echo "Restart=always" >> /etc/systemd/system/bedrock-analyser.service
          echo "RestartSec=5" >> /etc/systemd/system/bedrock-analyser.service
          echo "EnvironmentFile=/opt/bedrock-analyser/.env" >> /etc/systemd/system/bedrock-analyser.service
          echo "" >> /etc/systemd/system/bedrock-analyser.service
          echo "[Install]" >> /etc/systemd/system/bedrock-analyser.service
          echo "WantedBy=multi-user.target" >> /etc/systemd/system/bedrock-analyser.service

          systemctl daemon-reload
          systemctl enable bedrock-analyser
          systemctl start bedrock-analyser

          # Signal success
          signal_cfn 0

Mappings:
  RegionAMI:
    us-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-east-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-southeast-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-southeast-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-northeast-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ca-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    sa-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Outputs:
  DashboardURL:
    Description: Bedrock AI Analyser Dashboard URL
    Value: !Sub 'http://${Instance.PublicIp}:3000'
  InstanceId:
    Description: EC2 Instance ID (connect via SSM)
    Value: !Ref Instance
  LoginInfo:
    Description: Login credentials
    Value: 'Username: admin | Password: (the one you set during stack creation)'
